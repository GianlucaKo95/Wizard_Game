name: Build & Push Add-on Images

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            base: ghcr.io/home-assistant/amd64-base:latest
          - arch: aarch64
            platform: linux/arm64
            base: ghcr.io/home-assistant/aarch64-base:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version and owner
        id: version
        run: |
          VERSION=$(cat wizard/config.json | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: wizard
          file: wizard/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BUILD_FROM=${{ matrix.base }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.version.outputs.owner }}/homeassistant-addon-wizard-${{ matrix.arch }}:latest
            ${{ env.REGISTRY }}/${{ steps.version.outputs.owner }}/homeassistant-addon-wizard-${{ matrix.arch }}:${{ steps.version.outputs.version }}
          labels: |
            io.hass.version=${{ steps.version.outputs.version }}
            io.hass.name=Wizard
            io.hass.type=addon
            io.hass.arch=${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
