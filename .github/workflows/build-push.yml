name: Build & Push Add-on Images

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            base: ghcr.io/home-assistant/amd64-base:latest
          - arch: aarch64
            platform: linux/arm64
            base: ghcr.io/home-assistant/aarch64-base:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: wizard/frontend
        run: |
          npm install --no-audit --no-fund
          VITE_SUPABASE_URL=__SUPABASE_URL__ \
          VITE_SUPABASE_ANON_KEY=__SUPABASE_ANON_KEY__ \
          npm run build

      - name: Copy dist into Docker context
        run: cp -r wizard/frontend/dist wizard/dist

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version and owner
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('wizard/config.json'))['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: wizard
          file: wizard/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BUILD_FROM=${{ matrix.base }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.version.outputs.owner }}/homeassistant-addon-wizard-${{ matrix.arch }}:latest
            ${{ env.REGISTRY }}/${{ steps.version.outputs.owner }}/homeassistant-addon-wizard-${{ matrix.arch }}:${{ steps.version.outputs.version }}
          labels: |
            io.hass.version=${{ steps.version.outputs.version }}
            io.hass.name=Wizard
            io.hass.type=addon
            io.hass.arch=${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
